<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Switch to Light Mode</button>
    </div>
    <div class="container">
        <header>
            <h1>Lotto Number Generator</h1>
            <p>Click the button to generate your lucky numbers!</p>
        </header>
        <main>
            <lotto-numbers></lotto-numbers>
            <button id="generate-btn">Generate Numbers</button>
        </main>
        
        <section class="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xgonvdqz" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Tell us about your proposal" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Proposal</button>
            </form>
        </section>

        <section class="comments-section">
