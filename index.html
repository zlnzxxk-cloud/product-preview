<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto & Animal Face Test</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Switch to Light Mode</button>
    </div>
    <div class="container">
        <header>
            <h1>Fun AI Tools</h1>
            <p>Generate lucky numbers and discover your animal face!</p>
        </header>

        <section class="tool-section">
            <h2>Lotto Number Generator</h2>
            <main>
                <lotto-numbers></lotto-numbers>
                <button id="generate-btn">Generate Numbers</button>
            </main>
        </section>

        <section class="tool-section animal-test">
            <h2>AI Animal Face Test</h2>
            <p class="description">Upload a photo to see if you look more like a Dog or a Cat!</p>
            <div class="upload-area" id="upload-area">
                <input type="file" id="image-input" accept="image/*" hidden>
                <div class="upload-placeholder">
                    <span class="icon">📷</span>
                    <p>Click or Drag photo here</p>
                </div>
                <img id="preview-image" src="#" alt="Preview" style="display: none;">
            </div>
            <div id="loading-spinner" style="display: none;">Analyzing...</div>
            <div id="result-container" style="display: none;">
                <h3 id="result-text"></h3>
                <div class="progress-bars">
                    <div class="progress-item">
                        <span>Dog</span>
                        <div class="progress-bg"><div id="dog-bar" class="progress-fill"></div></div>
                        <span id="dog-percent">0%</span>
                    </div>
                    <div class="progress-item">
                        <span>Cat</span>
                        <div class="progress-bg"><div id="cat-bar" class="progress-fill"></div></div>
                        <span id="cat-percent">0%</span>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="contact-section">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/xgonvdqz" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="Tell us about your proposal" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Proposal</button>
            </form>
        </section>

        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://product-preview.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
